name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python
        run: python -m compileall custom_components/istore_solar tests
      - name: Validate JSON
        run: |
          python -m json.tool custom_components/istore_solar/manifest.json >/dev/null
          python -m json.tool custom_components/istore_solar/strings.json >/dev/null
          python -m json.tool custom_components/istore_solar/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Check whitespace
        run: git diff --check
